<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Carta del Menú - Pollería</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2c1a0e; /* Color cálido de fondo tipo madera */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .menu-card {
            max-width: 100%;
            width: 100%;
            background: #fff9ef;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .menu-card:hover {
            transform: scale(1.01);
        }

        .menu-image {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            background: #f5e6d3; /* fondo suave mientras carga */
        }

        .footer-note {
            text-align: center;
            padding: 16px 12px;
            background: #fef3e4;
            font-size: 0.85rem;
            color: #5a3e2b;
            border-top: 1px solid #f0dabc;
            letter-spacing: 0.3px;
        }

        .footer-note a {
            color: #b45f2b;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* Extra pequeño para que se vea bien en celular */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .footer-note {
                font-size: 0.75rem;
                padding: 12px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="menu-card">
        <!-- 
            IMPORTANTE: 
            La imagen debe estar en la misma carpeta que este archivo index.html
            y llamarse exactamente "cartapolleria.png" (respeta mayúsculas/minúsculas).
            Si tu imagen tiene otro nombre, cámbialo en el atributo src.
        -->
        <img class="menu-image" 
             src="cartapolleria.png" 
             alt="Carta del menú - Pollería"
             loading="eager">
        <div class="footer-note">
            🍗 Escanea el código QR para ver la carta desde tu celular · 
            <a href="#" onclick="alert('📲 Guarda esta página o comparte el enlace de GitHub Pages'); return false;">Compartir</a>
        </div>
    </div>
</body>
</html>
